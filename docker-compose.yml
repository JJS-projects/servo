services:
  servo-terminal-dev:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace/servo-terminal
    stdin_open: true
    tty: true
    environment:
      TERM: xterm-256color
      CARGO_HOME: /root/.cargo
      RUSTUP_HOME: /root/.rustup
      RUSTC_WRAPPER: sccache
      SCCACHE_DIR: /root/.cache/sccache
      SCCACHE_CACHE_SIZE: 20G
      SERVO_SRC: /workspace/servo
    volumes:
      - .:/workspace/servo
      - ../servo-terminal:/workspace/servo-terminal
      - cargo-registry:/root/.cargo/registry
      - cargo-git:/root/.cargo/git
      - servo-target:/workspace/servo/target
      - servo-terminal-target:/workspace/servo-terminal/target
      - sccache:/root/.cache/sccache

volumes:
  cargo-registry:
  cargo-git:
  servo-target:
  servo-terminal-target:
  sccache:
